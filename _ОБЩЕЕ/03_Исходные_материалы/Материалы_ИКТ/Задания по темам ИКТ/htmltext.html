<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Charts — Средние баллы</title>

  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #chart {
      width: 900px;
      max-width: 100%;
      height: 500px;
    }
  </style>

  <script>
    google.charts.load("current", { packages: ["corechart"] });
    google.charts.setOnLoadCallback(drawChart);

    function drawChart() {
      const data = google.visualization.arrayToDataTable([
        ["Предмет", "Средний балл", { role: "tooltip", type: "string" }],
        ["Математика", 4.2, "Математика: 4.2"],
        ["Информатика", 4.6, "Информатика: 4.6"],
        ["История", 3.9, "История: 3.9"],
      ]);

      const options = {
        title: "Средние баллы группы по предметам",
        legend: { position: "top" },
        tooltip: { isHtml: false },
        colors: ["#BE49DF"],
        hAxis: {
          title: "Учебные предметы",
          textStyle: { fontSize: 12 },
          titleTextStyle: { fontSize: 14, bold: true }
        },
        vAxis: {
          title: "Средний балл",
          viewWindow: { min: 0, max: 5 },
          gridlines: { count: 6 },
          titleTextStyle: { fontSize: 14, bold: true }
        },

        bar: { groupWidth: "55%" },
      };
      const chart = new google.visualization.ColumnChart(document.getElementById("chart"));
      chart.draw(data, options);
    }
  </script>
</head>

<body>
  <h2>Первая диаграмма Google Charts</h2>
  <div id="chart"></div>
</body>
</html>
