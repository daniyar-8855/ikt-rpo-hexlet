<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="270" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">GET и POST: в чём разница</text>

  <!-- GET -->
  <rect x="30" y="55" width="330" height="185" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">GET</text>

  <rect x="60" y="98" width="270" height="34" rx="6" fill="#2196F3"/>
  <text x="195" y="120" text-anchor="middle" font-size="12" fill="#ffffff">получить данные</text>

  <text x="195" y="158" text-anchor="middle" font-size="12" fill="#0d2b45">ничего не меняет на сервере</text>
  <text x="195" y="182" text-anchor="middle" font-size="12" fill="#0d2b45">параметры — в адресе (URL)</text>
  <text x="195" y="214" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">пример: узнать погоду, курс</text>

  <!-- POST -->
  <rect x="400" y="55" width="330" height="185" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">POST</text>

  <rect x="430" y="98" width="270" height="34" rx="6" fill="#4CAF50"/>
  <text x="565" y="120" text-anchor="middle" font-size="12" fill="#ffffff">отправить / создать данные</text>

  <text x="565" y="158" text-anchor="middle" font-size="12" fill="#1b5e20">меняет состояние на сервере</text>
  <text x="565" y="182" text-anchor="middle" font-size="12" fill="#1b5e20">данные — в теле запроса</text>
  <text x="565" y="214" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">пример: отправить сообщение</text>
</svg>
