<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">API как «меню»: запрос и ответ</text>

  <!-- Запрос -->
  <rect x="30" y="55" width="320" height="215" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="190" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">ЗАПРОС (ты просишь)</text>

  <rect x="55" y="100" width="270" height="34" rx="6" fill="#2196F3"/>
  <text x="190" y="122" text-anchor="middle" font-size="12" fill="#ffffff">URL — куда: api.weather.com/today</text>

  <rect x="55" y="144" width="270" height="34" rx="6" fill="#2196F3"/>
  <text x="190" y="166" text-anchor="middle" font-size="12" fill="#ffffff">метод — что: GET / POST</text>

  <rect x="55" y="188" width="270" height="34" rx="6" fill="#2196F3"/>
  <text x="190" y="210" text-anchor="middle" font-size="12" fill="#ffffff">параметры — city=Almaty</text>

  <text x="190" y="248" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">как заказ официанту по меню</text>

  <!-- Ответ -->
  <rect x="430" y="55" width="300" height="215" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="580" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">ОТВЕТ (получаешь JSON)</text>

  <rect x="455" y="100" width="250" height="120" rx="6" fill="#ffffff" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="475" y="124" font-size="12" fill="#1b5e20" font-family="monospace">{</text>
  <text x="490" y="146" font-size="12" fill="#1b5e20" font-family="monospace">"city": "Almaty",</text>
  <text x="490" y="168" font-size="12" fill="#1b5e20" font-family="monospace">"temp": 18,</text>
  <text x="490" y="190" font-size="12" fill="#1b5e20" font-family="monospace">"condition": "sunny"</text>
  <text x="475" y="212" font-size="12" fill="#1b5e20" font-family="monospace">}</text>

  <text x="580" y="248" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">берёшь нужное поле по ключу: temp</text>

  <!-- Стрелка -->
  <path d="M350 162 L430 162" stroke="#90caf9" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>
</svg>
