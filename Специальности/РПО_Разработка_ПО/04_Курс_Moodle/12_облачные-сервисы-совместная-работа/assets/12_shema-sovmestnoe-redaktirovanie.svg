<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="340" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Совместное редактирование и права доступа</text>

  <!-- Пользователи -->
  <rect x="40" y="70" width="190" height="44" rx="8" fill="#2196F3"/>
  <text x="135" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Редактор</text>
  <text x="135" y="107" text-anchor="middle" font-size="11" fill="#ffffff">право «редактирование»</text>

  <rect x="40" y="150" width="190" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="135" y="171" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Рецензент</text>
  <text x="135" y="187" text-anchor="middle" font-size="11" fill="#0d2b45">право «комментирование»</text>

  <rect x="40" y="230" width="190" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="135" y="251" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Читатель</text>
  <text x="135" y="267" text-anchor="middle" font-size="11" fill="#0d2b45">право «просмотр»</text>

  <!-- Документ -->
  <rect x="490" y="120" width="230" height="100" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="605" y="155" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">ОДИН ДОКУМЕНТ</text>
  <text x="605" y="180" text-anchor="middle" font-size="12" fill="#1b5e20">общий доступ</text>
  <text x="605" y="202" text-anchor="middle" font-size="12" fill="#1b5e20">история версий</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M230 92 L488 150"/>
    <path d="M230 172 L488 170"/>
    <path d="M230 252 L488 190"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="315" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Давай минимально необходимый уровень доступа конкретным людям</text>
</svg>
