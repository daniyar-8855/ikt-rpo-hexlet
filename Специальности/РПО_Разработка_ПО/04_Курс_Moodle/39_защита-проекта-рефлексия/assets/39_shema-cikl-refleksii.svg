<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Цикл рефлексии после проекта</text>

  <!-- Что получилось -->
  <rect x="280" y="55" width="200" height="48" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Что получилось</text>
  <text x="380" y="95" text-anchor="middle" font-size="10" fill="#2e7d32">сильные стороны работы</text>

  <!-- Что было трудно -->
  <rect x="520" y="125" width="200" height="48" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="620" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5c00">Что было трудно</text>
  <text x="620" y="165" text-anchor="middle" font-size="10" fill="#7a5c00">ошибки и сложности</text>

  <!-- Что улучшить -->
  <rect x="280" y="195" width="200" height="48" rx="8" fill="#2196F3"/>
  <text x="380" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Что улучшить</text>
  <text x="380" y="235" text-anchor="middle" font-size="10" fill="#ffffff">план на следующий раз</text>

  <!-- Чему научился -->
  <rect x="40" y="125" width="200" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="140" y="148" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">Чему научился</text>
  <text x="140" y="165" text-anchor="middle" font-size="10" fill="#37474f">новый навык, опыт</text>

  <!-- Стрелки по кругу -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arrR)">
    <path d="M480 88 Q560 100 600 125"/>
    <path d="M600 173 Q520 205 480 215"/>
    <path d="M280 219 Q190 200 160 173"/>
    <path d="M150 125 Q210 80 280 75"/>
  </g>

  <defs>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="285" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Честная рефлексия — это не «всё хорошо», а конкретные выводы для роста</text>
</svg>
