<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="340" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как задать хороший вопрос на Stack Overflow</text>

  <!-- Шаг 1 -->
  <rect x="40" y="60" width="200" height="50" rx="8" fill="#2196F3"/>
  <text x="140" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">1. Сначала поищи</text>
  <text x="140" y="100" text-anchor="middle" font-size="11" fill="#ffffff">возможно, уже отвечено</text>

  <!-- Шаг 2 -->
  <rect x="280" y="60" width="200" height="50" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">2. Понятный заголовок</text>
  <text x="380" y="100" text-anchor="middle" font-size="11" fill="#0d2b45">суть проблемы кратко</text>

  <!-- Шаг 3 -->
  <rect x="520" y="60" width="200" height="50" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="620" y="82" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">3. Минимальный пример</text>
  <text x="620" y="100" text-anchor="middle" font-size="11" fill="#0d2b45">код, который повторяет баг</text>

  <!-- Шаг 4 -->
  <rect x="40" y="160" width="200" height="50" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="140" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">4. Текст ошибки</text>
  <text x="140" y="200" text-anchor="middle" font-size="11" fill="#0d2b45">полностью, как есть</text>

  <!-- Шаг 5 -->
  <rect x="280" y="160" width="200" height="50" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">5. Что уже пробовал</text>
  <text x="380" y="196" text-anchor="middle" font-size="11" fill="#0d2b45">версия, среда, попытки</text>

  <!-- Шаг 6 -->
  <rect x="520" y="160" width="200" height="50" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="620" y="182" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">6. Чего ждёшь</text>
  <text x="620" y="200" text-anchor="middle" font-size="11" fill="#0d2b45">ожидаемый результат</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr20)">
    <path d="M240 85 L278 85"/>
    <path d="M480 85 L518 85"/>
    <path d="M240 185 L278 185"/>
    <path d="M480 185 L518 185"/>
  </g>

  <!-- Итог -->
  <rect x="180" y="255" width="400" height="55" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="280" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Хороший вопрос = быстрый и точный ответ</text>
  <text x="380" y="300" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">и помогает другим, кто столкнётся с тем же</text>

  <defs>
    <marker id="arr20" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>
</svg>
