<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="250" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Что такое открытые данные</text>

  <!-- Государство -->
  <rect x="30" y="80" width="200" height="70" rx="8" fill="#2196F3"/>
  <text x="130" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Государство</text>
  <text x="130" y="132" text-anchor="middle" font-size="12" fill="#ffffff">публикует</text>

  <!-- Набор данных -->
  <rect x="280" y="80" width="200" height="70" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">Набор данных</text>
  <text x="380" y="130" text-anchor="middle" font-size="12" fill="#37474f">data.egov.kz (CSV, JSON)</text>

  <!-- Любой использует -->
  <rect x="530" y="80" width="200" height="70" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="630" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Любой использует</text>
  <text x="630" y="130" text-anchor="middle" font-size="12" fill="#2e7d32">дашборды, проекты</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M230 115 L280 115"/>
    <path d="M480 115 L530 115"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="205" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Данные обезличены и публичны — их можно свободно скачивать и анализировать</text>
  <text x="380" y="228" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Персональные данные так публиковать нельзя</text>
</svg>
