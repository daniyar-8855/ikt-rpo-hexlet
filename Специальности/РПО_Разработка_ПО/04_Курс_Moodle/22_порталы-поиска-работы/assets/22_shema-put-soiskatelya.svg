<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="230" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Путь соискателя: от резюме до оффера</text>

  <!-- 1. Резюме -->
  <rect x="20" y="80" width="150" height="56" rx="8" fill="#2196F3"/>
  <text x="95" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Резюме</text>
  <text x="95" y="122" text-anchor="middle" font-size="11" fill="#ffffff">+ портфолио</text>

  <!-- 2. Отклик -->
  <rect x="205" y="80" width="150" height="56" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="280" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. Отклик</text>
  <text x="280" y="122" text-anchor="middle" font-size="11" fill="#37474f">на вакансию</text>

  <!-- 3. Собеседование -->
  <rect x="390" y="80" width="170" height="56" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="475" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">3. Собеседование</text>
  <text x="475" y="122" text-anchor="middle" font-size="11" fill="#37474f">тех. интервью</text>

  <!-- 4. Оффер -->
  <rect x="595" y="80" width="150" height="56" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="670" y="104" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">4. Оффер</text>
  <text x="670" y="122" text-anchor="middle" font-size="11" fill="#2e7d32">приглашение</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M170 108 L205 108"/>
    <path d="M355 108 L390 108"/>
    <path d="M560 108 L595 108"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="195" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Отказ на любом шаге — не конец: дорабатывай резюме и откликайся снова</text>
</svg>
