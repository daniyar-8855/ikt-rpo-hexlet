<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Сценарий автоматизации: триггер → действия</text>

  <!-- Триггер -->
  <rect x="30" y="80" width="200" height="90" rx="8" fill="#2196F3"/>
  <text x="130" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">ТРИГГЕР</text>
  <text x="130" y="136" text-anchor="middle" font-size="12" fill="#ffffff">событие-запуск</text>
  <text x="130" y="156" text-anchor="middle" font-size="11" fill="#ffffff">«заполнена форма»</text>

  <!-- Действие 1 -->
  <rect x="300" y="80" width="200" height="90" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="400" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">ДЕЙСТВИЕ 1</text>
  <text x="400" y="136" text-anchor="middle" font-size="12" fill="#0d2b45">записать строку</text>
  <text x="400" y="156" text-anchor="middle" font-size="11" fill="#37474f">в Google-таблицу</text>

  <!-- Действие 2 -->
  <rect x="570" y="80" width="160" height="90" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="650" y="112" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">ДЕЙСТВИЕ 2</text>
  <text x="650" y="136" text-anchor="middle" font-size="12" fill="#1b5e20">прислать</text>
  <text x="650" y="156" text-anchor="middle" font-size="11" fill="#2e7d32">уведомление</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="3" fill="none" marker-end="url(#arr)">
    <path d="M230 125 L300 125"/>
    <path d="M500 125 L570 125"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="225" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Одно событие запускает цепочку действий — всё собирается мышкой, без кода</text>
  <text x="380" y="255" text-anchor="middle" font-size="12" fill="#0d2b45">Платформы: Zapier, Make, n8n</text>
</svg>
