<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как работает простой чат-бот</text>

  <!-- Сообщение -->
  <rect x="40" y="110" width="190" height="70" rx="8" fill="#2196F3"/>
  <text x="135" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">СООБЩЕНИЕ</text>
  <text x="135" y="162" text-anchor="middle" font-size="11" fill="#ffffff">«где расписание?»</text>

  <!-- Правило -->
  <rect x="290" y="100" width="190" height="90" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="385" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">ПРАВИЛО</text>
  <text x="385" y="154" text-anchor="middle" font-size="11" fill="#0d2b45">если содержит</text>
  <text x="385" y="172" text-anchor="middle" font-size="11" fill="#37474f">«расписание» → ...</text>

  <!-- Ответ -->
  <rect x="540" y="110" width="190" height="70" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="635" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ОТВЕТ</text>
  <text x="635" y="162" text-anchor="middle" font-size="11" fill="#2e7d32">прислать ссылку</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="3" fill="none" marker-end="url(#arr)">
    <path d="M230 145 L290 145"/>
    <path d="M480 145 L540 145"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="235" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Простой бот = набор правил «сообщение → ответ»</text>
  <text x="380" y="262" text-anchor="middle" font-size="12" fill="#1b5e20">Подключишь ИИ — бот отвечает свободно, без жёстких правил</text>
</svg>
