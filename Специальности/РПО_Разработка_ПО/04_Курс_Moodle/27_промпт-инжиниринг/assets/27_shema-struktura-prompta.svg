<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Структура хорошего промпта</text>

  <!-- Роль -->
  <rect x="180" y="55" width="400" height="44" rx="8" fill="#2196F3"/>
  <text x="380" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. РОЛЬ</text>
  <text x="380" y="92" text-anchor="middle" font-size="11" fill="#ffffff">«Ты опытный Python-разработчик»</text>

  <!-- Задача -->
  <rect x="180" y="115" width="400" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. ЗАДАЧА</text>
  <text x="380" y="152" text-anchor="middle" font-size="11" fill="#0d2b45">«напиши функцию проверки e-mail»</text>

  <!-- Контекст -->
  <rect x="180" y="175" width="400" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="196" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">3. КОНТЕКСТ</text>
  <text x="380" y="212" text-anchor="middle" font-size="11" fill="#0d2b45">вход/выход, ограничения, пример</text>

  <!-- Формат ответа -->
  <rect x="180" y="235" width="400" height="44" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="256" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">4. ФОРМАТ ОТВЕТА</text>
  <text x="380" y="272" text-anchor="middle" font-size="11" fill="#1b5e20">«код + краткое пояснение»</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M380 99 L380 113"/>
    <path d="M380 159 L380 173"/>
    <path d="M380 219 L380 233"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="320" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Роль + Задача + Контекст + Формат = точный ответ ИИ</text>
  <text x="380" y="342" text-anchor="middle" font-size="11" fill="#37474f">Чем конкретнее каждая часть, тем меньше итераций нужно</text>
</svg>
