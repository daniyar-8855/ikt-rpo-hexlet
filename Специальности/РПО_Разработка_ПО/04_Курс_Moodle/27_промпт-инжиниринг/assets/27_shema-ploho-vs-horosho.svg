<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Плохой и хороший промпт</text>

  <!-- Плохой -->
  <rect x="30" y="55" width="330" height="210" rx="10" fill="#fdecea" stroke="#f44336" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">ПЛОХОЙ ПРОМПТ</text>

  <rect x="60" y="100" width="270" height="40" rx="6" fill="#f44336"/>
  <text x="195" y="125" text-anchor="middle" font-size="13" fill="#ffffff">«сделай сортировку»</text>

  <text x="195" y="170" text-anchor="middle" font-size="12" fill="#0d2b45">нет языка и направления</text>
  <text x="195" y="194" text-anchor="middle" font-size="12" fill="#0d2b45">нет вход/выход и примера</text>
  <text x="195" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Результат: ответ мимо цели</text>

  <!-- Хороший -->
  <rect x="400" y="55" width="330" height="210" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">ХОРОШИЙ ПРОМПТ</text>

  <rect x="430" y="100" width="270" height="40" rx="6" fill="#4CAF50"/>
  <text x="565" y="118" text-anchor="middle" font-size="11" fill="#ffffff">«Python-функция сортировки</text>
  <text x="565" y="132" text-anchor="middle" font-size="11" fill="#ffffff">списка по убыванию, без библиотек»</text>

  <text x="565" y="170" text-anchor="middle" font-size="12" fill="#1b5e20">язык, задача, ограничение</text>
  <text x="565" y="194" text-anchor="middle" font-size="12" fill="#1b5e20">пример [3,1,2] → [3,2,1]</text>
  <text x="565" y="234" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Результат: рабочий код</text>
</svg>
