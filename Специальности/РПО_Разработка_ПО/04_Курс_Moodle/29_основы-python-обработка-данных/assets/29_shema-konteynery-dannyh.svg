<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Контейнеры данных в Python</text>

  <!-- Переменная -->
  <rect x="30" y="60" width="210" height="180" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="135" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">ПЕРЕМЕННАЯ</text>
  <text x="135" y="106" text-anchor="middle" font-size="11" fill="#37474f">одно значение</text>

  <rect x="65" y="125" width="140" height="40" rx="6" fill="#2196F3"/>
  <text x="135" y="150" text-anchor="middle" font-size="13" fill="#ffffff">1500</text>
  <text x="135" y="195" text-anchor="middle" font-size="12" fill="#0d2b45">cena = 1500</text>
  <text x="135" y="222" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">одна цена</text>

  <!-- Список -->
  <rect x="265" y="60" width="230" height="180" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">СПИСОК (list)</text>
  <text x="380" y="106" text-anchor="middle" font-size="11" fill="#37474f">упорядоченный набор</text>

  <rect x="290" y="125" width="60" height="40" rx="6" fill="#2196F3"/>
  <text x="320" y="150" text-anchor="middle" font-size="12" fill="#ffffff">1500</text>
  <rect x="355" y="125" width="60" height="40" rx="6" fill="#2196F3"/>
  <text x="385" y="150" text-anchor="middle" font-size="12" fill="#ffffff">2000</text>
  <rect x="420" y="125" width="60" height="40" rx="6" fill="#2196F3"/>
  <text x="450" y="150" text-anchor="middle" font-size="12" fill="#ffffff">1800</text>

  <text x="380" y="195" text-anchor="middle" font-size="11" fill="#0d2b45">ceny = [1500, 2000, 1800]</text>
  <text x="380" y="222" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">как столбец таблицы</text>

  <!-- Словарь -->
  <rect x="520" y="60" width="215" height="180" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="627" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">СЛОВАРЬ (dict)</text>
  <text x="627" y="106" text-anchor="middle" font-size="11" fill="#2e7d32">пары «ключ — значение»</text>

  <rect x="545" y="120" width="170" height="34" rx="6" fill="#4CAF50"/>
  <text x="630" y="142" text-anchor="middle" font-size="12" fill="#ffffff">"name" : "Мышь"</text>
  <rect x="545" y="160" width="170" height="34" rx="6" fill="#4CAF50"/>
  <text x="630" y="182" text-anchor="middle" font-size="12" fill="#ffffff">"cena" : 1500</text>

  <text x="627" y="222" text-anchor="middle" font-size="11" fill="#1b5e20" font-style="italic">как строка с полями</text>

  <text x="380" y="278" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">список — набор значений, словарь — одна запись с подписанными полями</text>
</svg>
