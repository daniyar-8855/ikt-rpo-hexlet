<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="280" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">eGov.kz (веб) и eGov Mobile: что выбрать</text>

  <!-- Веб -->
  <rect x="30" y="55" width="330" height="200" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">eGov.kz — ВЕБ-ПОРТАЛ</text>

  <rect x="60" y="100" width="270" height="36" rx="6" fill="#2196F3"/>
  <text x="195" y="123" text-anchor="middle" font-size="12" fill="#ffffff">сайт в браузере на ПК</text>

  <text x="195" y="162" text-anchor="middle" font-size="12" fill="#0d2b45">вход по ЭЦП или SMS</text>
  <text x="195" y="186" text-anchor="middle" font-size="12" fill="#0d2b45">все услуги и оплаты</text>
  <text x="195" y="210" text-anchor="middle" font-size="12" fill="#0d2b45">удобно печатать документы</text>
  <text x="195" y="238" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">когда нужен большой экран</text>

  <!-- Mobile -->
  <rect x="400" y="55" width="330" height="200" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">eGov Mobile (mGov)</text>

  <rect x="430" y="100" width="270" height="36" rx="6" fill="#4CAF50"/>
  <text x="565" y="123" text-anchor="middle" font-size="12" fill="#ffffff">приложение на смартфоне</text>

  <text x="565" y="162" text-anchor="middle" font-size="12" fill="#1b5e20">вход по биометрии</text>
  <text x="565" y="186" text-anchor="middle" font-size="12" fill="#1b5e20">цифровые документы</text>
  <text x="565" y="210" text-anchor="middle" font-size="12" fill="#1b5e20">услуги всегда под рукой</text>
  <text x="565" y="238" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">когда нужно быстро и в дороге</text>
</svg>
