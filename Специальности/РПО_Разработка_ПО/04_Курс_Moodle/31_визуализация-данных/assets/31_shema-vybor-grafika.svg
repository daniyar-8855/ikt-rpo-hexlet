<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Выбор типа графика под задачу</text>

  <!-- Вопрос (старт) -->
  <rect x="280" y="50" width="200" height="46" rx="8" fill="#2196F3"/>
  <text x="380" y="71" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Что ты хочешь</text>
  <text x="380" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">показать?</text>

  <!-- Ветка 1: сравнение -->
  <rect x="30" y="160" width="160" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="110" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Сравнение</text>
  <rect x="30" y="240" width="160" height="44" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="110" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Столбцы (bar)</text>
  <text x="110" y="278" text-anchor="middle" font-size="10" fill="#2e7d32">продажи по городам</text>

  <!-- Ветка 2: динамика -->
  <rect x="220" y="160" width="160" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="300" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Динамика</text>
  <rect x="220" y="240" width="160" height="44" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="300" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Линия (line)</text>
  <text x="300" y="278" text-anchor="middle" font-size="10" fill="#2e7d32">цена по месяцам</text>

  <!-- Ветка 3: доли -->
  <rect x="410" y="160" width="160" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="490" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Доли целого</text>
  <rect x="410" y="240" width="160" height="44" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="490" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Круг (pie)</text>
  <text x="490" y="278" text-anchor="middle" font-size="10" fill="#2e7d32">структура расходов</text>

  <!-- Ветка 4: связь -->
  <rect x="600" y="160" width="160" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="680" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Связь величин</text>
  <rect x="600" y="240" width="160" height="44" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="680" y="262" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Точки (scatter)</text>
  <text x="680" y="278" text-anchor="middle" font-size="10" fill="#2e7d32">рост и вес</text>

  <!-- Стрелки от вопроса к веткам -->
  <g stroke="#90caf9" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M320 96 L110 160"/>
    <path d="M360 96 L300 160"/>
    <path d="M420 96 L490 160"/>
    <path d="M460 96 L680 160"/>
  </g>
  <!-- Стрелки от вопроса-ветки к ответу -->
  <g stroke="#90caf9" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M110 204 L110 240"/>
    <path d="M300 204 L300 240"/>
    <path d="M490 204 L490 240"/>
    <path d="M680 204 L680 240"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="330" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Сначала вопрос — потом график. Не «потому что красиво».</text>
</svg>
