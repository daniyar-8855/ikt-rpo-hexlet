<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Честная ось против обрезанной: как график обманывает</text>

  <!-- Левый блок: честная ось -->
  <rect x="30" y="55" width="330" height="255" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Честная ось (от нуля)</text>

  <!-- оси -->
  <line x1="80" y1="280" x2="340" y2="280" stroke="#1b5e20" stroke-width="2"/>
  <line x1="80" y1="100" x2="80" y2="280" stroke="#1b5e20" stroke-width="2"/>
  <text x="70" y="285" text-anchor="end" font-size="11" fill="#1b5e20">0</text>
  <text x="70" y="195" text-anchor="end" font-size="11" fill="#1b5e20">50</text>
  <line x1="76" y1="190" x2="80" y2="190" stroke="#1b5e20" stroke-width="2"/>
  <!-- столбцы: 100 и 105 -->
  <rect x="130" y="100" width="60" height="180" fill="#4CAF50"/>
  <rect x="230" y="91" width="60" height="189" fill="#4CAF50"/>
  <text x="160" y="298" text-anchor="middle" font-size="11" fill="#1b5e20">A=100</text>
  <text x="260" y="298" text-anchor="middle" font-size="11" fill="#1b5e20">B=105</text>
  <text x="195" y="325" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">разница маленькая — так и видно</text>

  <!-- Правый блок: обрезанная ось -->
  <rect x="400" y="55" width="330" height="255" rx="10" fill="#fdecea" stroke="#f44336" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">Обрезанная ось (с 98)</text>

  <line x1="450" y1="280" x2="710" y2="280" stroke="#b71c1c" stroke-width="2"/>
  <line x1="450" y1="100" x2="450" y2="280" stroke="#b71c1c" stroke-width="2"/>
  <text x="440" y="285" text-anchor="end" font-size="11" fill="#b71c1c">98</text>
  <text x="440" y="195" text-anchor="end" font-size="11" fill="#b71c1c">102</text>
  <line x1="446" y1="190" x2="450" y2="190" stroke="#b71c1c" stroke-width="2"/>
  <!-- столбцы выглядят сильно разными -->
  <rect x="500" y="190" width="60" height="90" fill="#f44336"/>
  <rect x="600" y="110" width="60" height="170" fill="#f44336"/>
  <text x="530" y="298" text-anchor="middle" font-size="11" fill="#b71c1c">A=100</text>
  <text x="630" y="298" text-anchor="middle" font-size="11" fill="#b71c1c">B=105</text>
  <text x="565" y="325" text-anchor="middle" font-size="11" fill="#c62828" font-style="italic">те же числа — а разница «огромна»</text>

  <text x="380" y="350" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Одни и те же данные. Обрезав ось, график вводит читателя в заблуждение.</text>
</svg>
