<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="220" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Этапы подготовки технической документации</text>

  <!-- 1 -->
  <rect x="20" y="70" width="135" height="70" rx="8" fill="#2196F3"/>
  <text x="87" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">1. Кто читатель</text>
  <text x="87" y="120" text-anchor="middle" font-size="11" fill="#e3f2fd">и зачем читает</text>

  <!-- 2 -->
  <rect x="180" y="70" width="135" height="70" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="247" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">2. План</text>
  <text x="247" y="120" text-anchor="middle" font-size="11" fill="#37474f">разделы и порядок</text>

  <!-- 3 -->
  <rect x="340" y="70" width="135" height="70" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="407" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">3. Текст</text>
  <text x="407" y="114" text-anchor="middle" font-size="11" fill="#37474f">по стилям: списки,</text>
  <text x="407" y="130" text-anchor="middle" font-size="11" fill="#37474f">таблицы, код</text>

  <!-- 4 -->
  <rect x="500" y="70" width="135" height="70" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="567" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">4. Проверка</text>
  <text x="567" y="114" text-anchor="middle" font-size="11" fill="#37474f">пройти по шагам</text>
  <text x="567" y="130" text-anchor="middle" font-size="11" fill="#37474f">самому</text>

  <!-- 5 -->
  <rect x="640" y="70" width="100" height="70" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="690" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">5. Публи-</text>
  <text x="690" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">кация</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M155 105 L180 105"/>
    <path d="M315 105 L340 105"/>
    <path d="M475 105 L500 105"/>
    <path d="M635 105 L640 105"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="190" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">сначала продумай читателя и структуру, потом пиши и обязательно проверь работоспособность инструкции</text>
</svg>
