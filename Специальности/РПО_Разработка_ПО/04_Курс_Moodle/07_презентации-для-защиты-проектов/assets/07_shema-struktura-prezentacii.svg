<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="230" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Структура презентации для защиты</text>

  <!-- Титул -->
  <rect x="20" y="70" width="130" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="85" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Титул</text>
  <text x="85" y="114" text-anchor="middle" font-size="10" fill="#37474f">тема, автор</text>

  <!-- Проблема -->
  <rect x="170" y="70" width="130" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="235" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Проблема</text>
  <text x="235" y="114" text-anchor="middle" font-size="10" fill="#37474f">что решаем и зачем</text>

  <!-- Решение -->
  <rect x="320" y="70" width="130" height="60" rx="8" fill="#2196F3"/>
  <text x="385" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Решение</text>
  <text x="385" y="114" text-anchor="middle" font-size="10" fill="#ffffff">что сделали, как</text>

  <!-- Демонстрация -->
  <rect x="470" y="70" width="130" height="60" rx="8" fill="#2196F3"/>
  <text x="535" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Демонстрация</text>
  <text x="535" y="114" text-anchor="middle" font-size="10" fill="#ffffff">демо / скриншоты</text>

  <!-- Итог -->
  <rect x="620" y="70" width="120" height="60" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="680" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Итог</text>
  <text x="680" y="114" text-anchor="middle" font-size="10" fill="#2e7d32">выводы, что дальше</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M150 100 L168 100"/>
    <path d="M300 100 L318 100"/>
    <path d="M450 100 L468 100"/>
    <path d="M600 100 L618 100"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="180" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">5–8 слайдов: каждый шаг — отдельный слайд, на слайде тезис, объяснение — голосом</text>
  <text x="380" y="205" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">логика рассказа: проблема → решение → результат</text>
</svg>
