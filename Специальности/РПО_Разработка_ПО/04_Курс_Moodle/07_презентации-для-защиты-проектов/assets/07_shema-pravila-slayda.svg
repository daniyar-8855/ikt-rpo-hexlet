<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Плохой слайд и хороший слайд</text>

  <!-- Плохой слайд -->
  <rect x="30" y="55" width="330" height="195" rx="10" fill="#fdecea" stroke="#f44336" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#b71c1c">ПЛОХО</text>

  <rect x="60" y="100" width="270" height="36" rx="6" fill="#f44336"/>
  <text x="195" y="123" text-anchor="middle" font-size="12" fill="#ffffff">«простыня» текста</text>

  <text x="195" y="162" text-anchor="middle" font-size="12" fill="#5d1a16">много мыслей сразу</text>
  <text x="195" y="186" text-anchor="middle" font-size="12" fill="#5d1a16">мелкий шрифт, пёстрый стиль</text>
  <text x="195" y="222" text-anchor="middle" font-size="11" fill="#7a2620" font-style="italic">докладчик зачитывает слайд</text>

  <!-- Хороший слайд -->
  <rect x="400" y="55" width="330" height="195" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">ХОРОШО</text>

  <rect x="430" y="100" width="270" height="36" rx="6" fill="#4CAF50"/>
  <text x="565" y="123" text-anchor="middle" font-size="12" fill="#ffffff">один смысл, мало текста</text>

  <text x="565" y="162" text-anchor="middle" font-size="12" fill="#1b5e20">крупный шрифт, контраст</text>
  <text x="565" y="186" text-anchor="middle" font-size="12" fill="#1b5e20">схема вместо абзаца</text>
  <text x="565" y="222" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">тезис на слайде, объяснение голосом</text>

  <text x="380" y="280" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">три правила: мало текста · один смысл · контраст и крупный шрифт</text>
</svg>
