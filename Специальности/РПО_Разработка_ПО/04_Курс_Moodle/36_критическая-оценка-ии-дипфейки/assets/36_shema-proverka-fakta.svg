<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="330" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как проверить факт от ИИ</text>

  <!-- Старт: ответ ИИ -->
  <rect x="290" y="50" width="180" height="46" rx="8" fill="#2196F3"/>
  <text x="380" y="71" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Ответ ИИ</text>
  <text x="380" y="88" text-anchor="middle" font-size="11" fill="#e3f2fd">звучит уверенно</text>

  <!-- Три способа проверки -->
  <rect x="40" y="140" width="210" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="145" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">1. Первоисточник</text>
  <text x="145" y="182" text-anchor="middle" font-size="11" fill="#37474f">закон — на adilet.zan.kz</text>

  <rect x="275" y="140" width="210" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">2. Проверь ссылки</text>
  <text x="380" y="182" text-anchor="middle" font-size="11" fill="#37474f">статья реально есть?</text>

  <rect x="510" y="140" width="210" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="615" y="163" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">3. Спроси иначе</text>
  <text x="615" y="182" text-anchor="middle" font-size="11" fill="#37474f">сравни ответы</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M330 96 L160 138"/>
    <path d="M380 96 L380 138"/>
    <path d="M430 96 L600 138"/>
    <path d="M145 200 L350 248"/>
    <path d="M380 200 L380 248"/>
    <path d="M615 200 L410 248"/>
  </g>

  <!-- Итог -->
  <rect x="240" y="250" width="280" height="50" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="272" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Факт подтверждён источником</text>
  <text x="380" y="290" text-anchor="middle" font-size="11" fill="#2e7d32">только теперь можно доверять</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>
</svg>
