<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Признаки дипфейка: на что смотреть</text>

  <!-- Центр -->
  <rect x="300" y="125" width="160" height="50" rx="8" fill="#2196F3"/>
  <text x="380" y="147" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Подозрительное</text>
  <text x="380" y="164" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">фото / видео</text>

  <!-- Признак 1: детали изображения -->
  <rect x="40" y="55" width="230" height="52" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="155" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Детали изображения</text>
  <text x="155" y="95" text-anchor="middle" font-size="11" fill="#37474f">лишние пальцы, кривой текст</text>

  <!-- Признак 2: рассинхрон губ и звука -->
  <rect x="490" y="55" width="230" height="52" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="605" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Рассинхрон губ и звука</text>
  <text x="605" y="95" text-anchor="middle" font-size="11" fill="#37474f">неестественная мимика</text>

  <!-- Признак 3: источник -->
  <rect x="40" y="195" width="230" height="52" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="155" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Источник</text>
  <text x="155" y="235" text-anchor="middle" font-size="11" fill="#37474f">нет подтверждения в СМИ</text>

  <!-- Признак 4: сенсационность -->
  <rect x="490" y="195" width="230" height="52" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="605" y="217" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Сенсационность</text>
  <text x="605" y="235" text-anchor="middle" font-size="11" fill="#37474f">бьёт по эмоциям</text>

  <!-- Линии -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none">
    <path d="M300 135 L270 90"/>
    <path d="M460 135 L490 90"/>
    <path d="M300 165 L270 210"/>
    <path d="M460 165 L490 210"/>
  </g>

  <text x="380" y="285" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Главная проверка — источник: где впервые появилось и кто подтверждает</text>
</svg>
