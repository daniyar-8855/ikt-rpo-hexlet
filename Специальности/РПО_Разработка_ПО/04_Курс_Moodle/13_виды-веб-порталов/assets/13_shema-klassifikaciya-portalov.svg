<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Классификация веб-порталов</text>

  <!-- Корень -->
  <rect x="280" y="50" width="200" height="40" rx="8" fill="#2196F3"/>
  <text x="380" y="75" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Веб-порталы</text>

  <!-- Линии к четырём типам -->
  <g stroke="#90caf9" stroke-width="2" fill="none">
    <path d="M380 90 L95 150"/>
    <path d="M380 90 L285 150"/>
    <path d="M380 90 L475 150"/>
    <path d="M380 90 L665 150"/>
  </g>

  <!-- Государственные -->
  <rect x="20" y="150" width="150" height="58" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="95" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Государственные</text>
  <text x="95" y="195" text-anchor="middle" font-size="11" fill="#37474f">eGov.kz</text>

  <!-- Справочные -->
  <rect x="210" y="150" width="150" height="58" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="285" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Справочные</text>
  <text x="285" y="195" text-anchor="middle" font-size="11" fill="#37474f">Әділет, data.egov.kz</text>

  <!-- Интерактивные -->
  <rect x="400" y="150" width="150" height="58" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="475" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Интерактивные</text>
  <text x="475" y="195" text-anchor="middle" font-size="11" fill="#2e7d32">salyk.kz, банки</text>

  <!-- Образовательные -->
  <rect x="590" y="150" width="150" height="58" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="665" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Образовательные</text>
  <text x="665" y="195" text-anchor="middle" font-size="11" fill="#37474f">платформы курсов</text>

  <text x="380" y="262" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Сначала пойми задачу (узнать / получить услугу) — потом выбери тип портала</text>
</svg>
