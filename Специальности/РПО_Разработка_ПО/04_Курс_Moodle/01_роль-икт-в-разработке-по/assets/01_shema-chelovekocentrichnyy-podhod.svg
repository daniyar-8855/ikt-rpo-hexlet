<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="340" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Человекоцентричный подход к ИИ</text>

  <!-- Человек ставит задачу -->
  <rect x="40" y="70" width="200" height="70" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ЧЕЛОВЕК</text>
  <text x="140" y="118" text-anchor="middle" font-size="12" fill="#1b5e20">ставит задачу,</text>
  <text x="140" y="133" text-anchor="middle" font-size="12" fill="#1b5e20">задаёт цель и контекст</text>

  <!-- ИИ помощник -->
  <rect x="290" y="70" width="180" height="70" rx="8" fill="#2196F3"/>
  <text x="380" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">ИИ-ПОМОЩНИК</text>
  <text x="380" y="118" text-anchor="middle" font-size="11" fill="#ffffff">пишет код, объясняет,</text>
  <text x="380" y="132" text-anchor="middle" font-size="11" fill="#ffffff">предлагает варианты</text>

  <!-- Человек проверяет и решает -->
  <rect x="520" y="70" width="200" height="70" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="620" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ЧЕЛОВЕК</text>
  <text x="620" y="118" text-anchor="middle" font-size="12" fill="#1b5e20">проверяет результат,</text>
  <text x="620" y="133" text-anchor="middle" font-size="12" fill="#1b5e20">принимает решение</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M240 105 L288 105"/>
    <path d="M470 105 L518 105"/>
  </g>
  <text x="264" y="96" text-anchor="middle" font-size="10" fill="#37474f">запрос</text>
  <text x="494" y="96" text-anchor="middle" font-size="10" fill="#37474f">черновик</text>

  <!-- Что у ИИ не так -->
  <rect x="40" y="180" width="680" height="62" rx="8" fill="#fdecea" stroke="#f44336" stroke-width="1.5"/>
  <text x="380" y="202" text-anchor="middle" font-size="13" font-weight="bold" fill="#b71c1c">У ИИ три ограничения</text>
  <text x="380" y="222" text-anchor="middle" font-size="11" fill="#5d1a1a">уверенно ошибается (галлюцинации) · не знает весь контекст · не несёт ответственности</text>

  <!-- Вывод -->
  <rect x="40" y="262" width="680" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="289" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">ИИ усиливает человека, но решение и ответственность — за человеком</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>
</svg>
