<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Место ИКТ в жизненном цикле разработки ПО</text>

  <!-- Этап 1 -->
  <rect x="20" y="70" width="135" height="64" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="87" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Постановка</text>
  <text x="87" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">задачи</text>
  <text x="87" y="126" text-anchor="middle" font-size="10" fill="#37474f">документация</text>

  <!-- Этап 2 -->
  <rect x="170" y="70" width="135" height="64" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="237" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Проектирование</text>
  <text x="237" y="120" text-anchor="middle" font-size="10" fill="#37474f">доски, диаграммы</text>

  <!-- Этап 3 (акцент) -->
  <rect x="320" y="70" width="135" height="64" rx="8" fill="#2196F3"/>
  <text x="387" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Разработка</text>
  <text x="387" y="114" text-anchor="middle" font-size="10" fill="#ffffff">ОС, терминал, git,</text>
  <text x="387" y="127" text-anchor="middle" font-size="10" fill="#ffffff">ИИ-ассистент</text>

  <!-- Этап 4 -->
  <rect x="470" y="70" width="135" height="64" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="537" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Тестирование</text>
  <text x="537" y="120" text-anchor="middle" font-size="10" fill="#37474f">автотесты, ИИ</text>

  <!-- Этап 5 -->
  <rect x="620" y="70" width="120" height="64" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="680" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Сопровожд.</text>
  <text x="680" y="120" text-anchor="middle" font-size="10" fill="#37474f">логи, мониторинг</text>

  <!-- Стрелки между этапами -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M155 102 L168 102"/>
    <path d="M305 102 L318 102"/>
    <path d="M455 102 L468 102"/>
    <path d="M605 102 L618 102"/>
  </g>

  <!-- Подложка ИКТ -->
  <rect x="20" y="180" width="720" height="48" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="203" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ИКТ — рабочая среда на ВСЕХ этапах</text>
  <text x="380" y="220" text-anchor="middle" font-size="11" fill="#1b5e20">ОС · файлы · сеть и облако · совместная работа · данные</text>

  <!-- Линии вниз к подложке -->
  <g stroke="#a5d6a7" stroke-width="1.5" stroke-dasharray="4,4">
    <path d="M87 134 L87 180"/>
    <path d="M237 134 L237 180"/>
    <path d="M387 134 L387 180"/>
    <path d="M537 134 L537 180"/>
    <path d="M680 134 L680 180"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="270" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">«Уметь программировать» и «уметь работать в цифровой среде» — два разных навыка</text>
</svg>
