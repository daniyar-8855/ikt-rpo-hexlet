<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="320" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как работает ЭЦП: закрытый ключ подписывает, открытый проверяет</text>

  <!-- Левая сторона: Автор -->
  <text x="150" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">АВТОР (подписывает)</text>

  <rect x="40" y="80" width="220" height="42" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="150" y="106" text-anchor="middle" font-size="13" fill="#0d2b45">Документ</text>

  <rect x="40" y="150" width="220" height="42" rx="8" fill="#2196F3"/>
  <text x="150" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Закрытый ключ</text>
  <text x="150" y="185" text-anchor="middle" font-size="10" fill="#e3f2fd">секрет, только у тебя</text>

  <!-- Правая сторона: Проверяющий -->
  <text x="610" y="66" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ПОЛУЧАТЕЛЬ (проверяет)</text>

  <rect x="500" y="150" width="220" height="42" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="610" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Открытый ключ</text>
  <text x="610" y="185" text-anchor="middle" font-size="10" fill="#2e7d32">доступен всем</text>

  <rect x="500" y="230" width="220" height="48" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="610" y="251" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Подпись верна:</text>
  <text x="610" y="267" text-anchor="middle" font-size="11" fill="#2e7d32">автор тот, документ не меняли</text>

  <!-- Центр: подписанный документ -->
  <rect x="285" y="150" width="190" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="171" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Подписанный</text>
  <text x="380" y="187" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">документ + подпись</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none">
    <path d="M150 122 L150 150" marker-end="url(#arr)"/>
    <path d="M260 171 L285 174" marker-end="url(#arr)"/>
    <path d="M475 174 L500 171" marker-end="url(#arrg)"/>
    <path d="M610 192 L610 230" marker-end="url(#arrg)"/>
  </g>

  <text x="270" y="142" text-anchor="middle" font-size="10" fill="#37474f" font-style="italic">подписывает закрытым</text>
  <text x="490" y="142" text-anchor="middle" font-size="10" fill="#2e7d32" font-style="italic">проверяет открытым</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4CAF50"/></marker>
  </defs>

  <text x="380" y="305" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Закрытый ключ — секрет (им подписываешь); открытый — для всех (им проверяют)</text>
</svg>
