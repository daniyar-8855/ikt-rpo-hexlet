<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="240" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как устроен онлайн-курс</text>

  <!-- Теория -->
  <rect x="40" y="80" width="180" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="130" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">1. Теория</text>
  <text x="130" y="128" text-anchor="middle" font-size="11" fill="#37474f">читаешь / смотришь</text>

  <!-- Практика -->
  <rect x="290" y="80" width="180" height="60" rx="8" fill="#2196F3"/>
  <text x="380" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">2. Практика</text>
  <text x="380" y="128" text-anchor="middle" font-size="11" fill="#e3f2fd">задания с проверкой</text>

  <!-- Проект -->
  <rect x="540" y="80" width="180" height="60" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="630" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">3. Проект</text>
  <text x="630" y="128" text-anchor="middle" font-size="11" fill="#2e7d32">собираешь сам</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M220 110 L290 110"/>
    <path d="M470 110 L540 110"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="130" y="175" text-anchor="middle" font-size="11" fill="#37474f">понять идею</text>
  <text x="380" y="175" text-anchor="middle" font-size="11" fill="#37474f">закрепить руками</text>
  <text x="630" y="175" text-anchor="middle" font-size="11" fill="#37474f">показать в портфолио</text>

  <text x="380" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c5e">Проходи курс до конца: теория без практики и проекта быстро забывается</text>
</svg>
