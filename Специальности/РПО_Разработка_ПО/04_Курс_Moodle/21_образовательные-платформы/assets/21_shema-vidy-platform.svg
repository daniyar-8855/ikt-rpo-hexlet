<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Виды обучающих платформ</text>

  <!-- Интерактивные курсы -->
  <rect x="30" y="60" width="220" height="160" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="140" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Интерактивные курсы</text>
  <rect x="55" y="105" width="170" height="32" rx="6" fill="#4CAF50"/>
  <text x="140" y="126" text-anchor="middle" font-size="12" fill="#ffffff">теория + задания</text>
  <text x="140" y="160" text-anchor="middle" font-size="12" fill="#1b5e20">проверка в браузере</text>
  <text x="140" y="182" text-anchor="middle" font-size="12" fill="#1b5e20">шаг за шагом</text>
  <text x="140" y="206" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">Хекслет, Stepik</text>

  <!-- Видео-курсы -->
  <rect x="270" y="60" width="220" height="160" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">Видео-курсы</text>
  <rect x="295" y="105" width="170" height="32" rx="6" fill="#2196F3"/>
  <text x="380" y="126" text-anchor="middle" font-size="12" fill="#ffffff">лекции и записи</text>
  <text x="380" y="160" text-anchor="middle" font-size="12" fill="#0d2b45">смотришь и слушаешь</text>
  <text x="380" y="182" text-anchor="middle" font-size="12" fill="#0d2b45">мало проверки</text>
  <text x="380" y="206" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">Coursera, YouTube</text>

  <!-- Практика с проверкой кода -->
  <rect x="510" y="60" width="220" height="160" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="620" y="88" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Практика с проверкой</text>
  <rect x="535" y="105" width="170" height="32" rx="6" fill="#4CAF50"/>
  <text x="620" y="126" text-anchor="middle" font-size="12" fill="#ffffff">пишешь код → тест</text>
  <text x="620" y="160" text-anchor="middle" font-size="12" fill="#1b5e20">автопроверка решения</text>
  <text x="620" y="182" text-anchor="middle" font-size="12" fill="#1b5e20">задачи и тренажёры</text>
  <text x="620" y="206" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">Хекслет, LeetCode</text>

  <text x="380" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c5e">Чем больше практики и проверки — тем быстрее формируется навык</text>
  <text x="380" y="290" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">смотреть полезно, но навык даёт действие</text>
</svg>
