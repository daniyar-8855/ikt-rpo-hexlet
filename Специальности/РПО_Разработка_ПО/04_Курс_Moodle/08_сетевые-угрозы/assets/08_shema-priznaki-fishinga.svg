<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Признаки фишингового письма</text>

  <!-- Письмо в центре -->
  <rect x="280" y="50" width="200" height="44" rx="8" fill="#2196F3"/>
  <text x="380" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Подозрительное письмо</text>

  <!-- Признак 1 -->
  <rect x="30" y="120" width="330" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="195" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Срочность и угрозы</text>
  <text x="195" y="159" text-anchor="middle" font-size="11" fill="#0d2b45">«подтвердите, иначе блокировка»</text>

  <!-- Признак 2 -->
  <rect x="400" y="120" width="330" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="565" y="140" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Домен с опечаткой</text>
  <text x="565" y="159" text-anchor="middle" font-size="11" fill="#0d2b45">kaspi-bank.ru вместо kaspi.kz</text>

  <!-- Признак 3 -->
  <rect x="30" y="180" width="330" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="195" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Просьба ввести пароль по ссылке</text>
  <text x="195" y="219" text-anchor="middle" font-size="11" fill="#0d2b45">настоящий сервис так не делает</text>

  <!-- Признак 4 -->
  <rect x="400" y="180" width="330" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="565" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Неожиданное вложение</text>
  <text x="565" y="219" text-anchor="middle" font-size="11" fill="#0d2b45">файлы .exe, .zip</text>

  <!-- Признак 5 -->
  <rect x="215" y="240" width="330" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Обезличенное обращение и ошибки</text>
  <text x="380" y="279" text-anchor="middle" font-size="11" fill="#0d2b45">«Уважаемый клиент», опечатки</text>

  <!-- Линии от письма к признакам -->
  <line x1="340" y1="94" x2="195" y2="120" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="420" y1="94" x2="565" y2="120" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="340" y1="94" x2="195" y2="180" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="420" y1="94" x2="565" y2="180" stroke="#90caf9" stroke-width="1.5"/>
  <line x1="380" y1="94" x2="380" y2="240" stroke="#90caf9" stroke-width="1.5"/>

  <!-- Правильное действие -->
  <rect x="180" y="305" width="400" height="40" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Не переходи по ссылке — зайди на сайт вручную</text>
</svg>
