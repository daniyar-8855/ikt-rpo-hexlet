<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Соответствие систем счисления</text>

  <!-- Десятичная -->
  <rect x="30" y="55" width="220" height="200" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="55" y="72" width="170" height="34" rx="6" fill="#2196F3"/>
  <text x="140" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Десятичная (10)</text>
  <text x="140" y="130" text-anchor="middle" font-size="12" fill="#0d2b45">цифры 0–9</text>
  <text x="140" y="170" text-anchor="middle" font-size="22" font-weight="bold" fill="#0d2b45">13</text>
  <text x="140" y="200" text-anchor="middle" font-size="22" font-weight="bold" fill="#0d2b45">255</text>
  <text x="140" y="235" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">привычные числа</text>

  <!-- Двоичная -->
  <rect x="270" y="55" width="220" height="200" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="295" y="72" width="170" height="34" rx="6" fill="#2196F3"/>
  <text x="380" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Двоичная (2)</text>
  <text x="380" y="130" text-anchor="middle" font-size="12" fill="#0d2b45">цифры 0, 1</text>
  <text x="380" y="170" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d2b45">1101</text>
  <text x="380" y="200" text-anchor="middle" font-size="20" font-weight="bold" fill="#0d2b45">11111111</text>
  <text x="380" y="235" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">внутри компьютера</text>

  <!-- Шестнадцатеричная -->
  <rect x="510" y="55" width="220" height="200" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="535" y="72" width="170" height="34" rx="6" fill="#4CAF50"/>
  <text x="620" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Шестнадцат. (16)</text>
  <text x="620" y="130" text-anchor="middle" font-size="12" fill="#1b5e20">цифры 0–9, A–F</text>
  <text x="620" y="170" text-anchor="middle" font-size="22" font-weight="bold" fill="#1b5e20">D</text>
  <text x="620" y="200" text-anchor="middle" font-size="22" font-weight="bold" fill="#1b5e20">FF</text>
  <text x="620" y="235" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">цвета, адреса памяти</text>

  <!-- Стрелки соответствия -->
  <g stroke="#90caf9" stroke-width="2" fill="none">
    <line x1="250" y1="170" x2="270" y2="170"/>
    <line x1="490" y1="170" x2="510" y2="170"/>
    <line x1="250" y1="200" x2="270" y2="200"/>
    <line x1="490" y1="200" x2="510" y2="200"/>
  </g>

  <text x="380" y="285" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">одно и то же число — три записи: 13 = 1101 = D, 255 = 11111111 = FF</text>
</svg>
