<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="230" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Единицы информации: от бита к мегабайту</text>

  <!-- Бит -->
  <rect x="20" y="70" width="120" height="60" rx="8" fill="#2196F3"/>
  <text x="80" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Бит</text>
  <text x="80" y="118" text-anchor="middle" font-size="11" fill="#ffffff">0 или 1</text>

  <!-- Байт -->
  <rect x="200" y="70" width="120" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="260" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">Байт</text>
  <text x="260" y="118" text-anchor="middle" font-size="11" fill="#0d2b45">8 бит</text>

  <!-- Килобайт -->
  <rect x="380" y="70" width="120" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="440" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">Килобайт</text>
  <text x="440" y="118" text-anchor="middle" font-size="11" fill="#0d2b45">1024 байта</text>

  <!-- Мегабайт -->
  <rect x="560" y="70" width="120" height="60" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="620" y="98" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Мегабайт</text>
  <text x="620" y="118" text-anchor="middle" font-size="11" fill="#1b5e20">1024 Кб</text>

  <!-- Стрелки x1024 -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <line x1="140" y1="100" x2="198" y2="100"/>
    <line x1="320" y1="100" x2="378" y2="100"/>
    <line x1="500" y1="100" x2="558" y2="100"/>
  </g>
  <text x="170" y="60" text-anchor="middle" font-size="11" fill="#2e7d32">×8</text>
  <text x="349" y="60" text-anchor="middle" font-size="11" fill="#2e7d32">×1024</text>
  <text x="529" y="60" text-anchor="middle" font-size="11" fill="#2e7d32">×1024</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="180" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">каждая следующая единица больше предыдущей в 1024 раза (а байт — это 8 бит)</text>
  <text x="380" y="205" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">дальше: Гигабайт = 1024 Мб, Терабайт = 1024 Гб</text>
</svg>
