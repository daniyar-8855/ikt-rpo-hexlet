<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как связаны ИИ, машинное обучение и нейросети</text>

  <!-- Внешний круг: ИИ -->
  <ellipse cx="380" cy="210" rx="330" ry="120" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="118" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">Искусственный интеллект (ИИ)</text>
  <text x="380" y="138" text-anchor="middle" font-size="12" fill="#37474f">машина решает задачи, требующие «интеллекта»</text>

  <!-- Средний круг: ML -->
  <ellipse cx="380" cy="225" rx="225" ry="95" fill="#bbdefb" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">Машинное обучение (ML)</text>
  <text x="380" y="196" text-anchor="middle" font-size="11" fill="#37474f">программа учится на данных</text>

  <!-- Внутренний круг: глубокое обучение / нейросети -->
  <ellipse cx="380" cy="240" rx="120" ry="62" fill="#2196F3"/>
  <text x="380" y="232" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Глубокое обучение</text>
  <text x="380" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">(нейросети)</text>
  <text x="380" y="268" text-anchor="middle" font-size="10" fill="#e3f2fd">генеративные модели</text>

  <text x="380" y="346" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">ИИ шире ML, ML шире глубокого обучения — это вложенные множества</text>
</svg>
