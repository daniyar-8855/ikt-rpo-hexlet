<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Человекоцентричный подход (по рамке ЮНЕСКО)</text>

  <!-- Человек ставит цель -->
  <rect x="30" y="70" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="130" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ЧЕЛОВЕК</text>
  <text x="130" y="122" text-anchor="middle" font-size="12" fill="#1b5e20">ставит цель,</text>
  <text x="130" y="138" text-anchor="middle" font-size="12" fill="#1b5e20">задаёт задачу</text>

  <!-- ИИ-инструмент -->
  <rect x="280" y="70" width="200" height="80" rx="8" fill="#2196F3"/>
  <text x="380" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">ИИ — ИНСТРУМЕНТ</text>
  <text x="380" y="122" text-anchor="middle" font-size="12" fill="#ffffff">генерирует результат,</text>
  <text x="380" y="138" text-anchor="middle" font-size="12" fill="#ffffff">но может ошибаться</text>

  <!-- Человек решает -->
  <rect x="530" y="70" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="630" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">ЧЕЛОВЕК</text>
  <text x="630" y="122" text-anchor="middle" font-size="12" fill="#1b5e20">критически оценивает</text>
  <text x="630" y="138" text-anchor="middle" font-size="12" fill="#1b5e20">и принимает решение</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M230 110 L278 110"/>
    <path d="M480 110 L528 110"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <!-- Принципы внизу -->
  <rect x="30" y="190" width="700" height="74" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="214" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Главное правило: ответственность за результат всегда на человеке</text>
  <text x="380" y="236" text-anchor="middle" font-size="12" fill="#37474f">критическая оценка ответа · решение с последствиями — за человеком</text>
  <text x="380" y="254" text-anchor="middle" font-size="12" fill="#37474f">уважение прав, приватности и закона</text>
</svg>
