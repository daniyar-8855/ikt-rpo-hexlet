<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как работает поисковый запрос</text>

  <!-- Запрос -->
  <rect x="30" y="90" width="180" height="60" rx="8" fill="#2196F3"/>
  <text x="120" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Запрос</text>
  <text x="120" y="136" text-anchor="middle" font-size="11" fill="#ffffff">слова + операторы</text>

  <!-- Индекс -->
  <rect x="290" y="90" width="180" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. Индекс</text>
  <text x="380" y="136" text-anchor="middle" font-size="11" fill="#37474f">база страниц поисковика</text>

  <!-- Результаты -->
  <rect x="550" y="90" width="180" height="60" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="640" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">3. Результаты</text>
  <text x="640" y="136" text-anchor="middle" font-size="11" fill="#2e7d32">ранжированный список</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M210 120 L290 120"/>
    <path d="M470 120 L550 120"/>
  </g>

  <!-- Подпись под индексом -->
  <text x="380" y="180" text-anchor="middle" font-size="11" fill="#37474f">поисковик заранее обошёл и проиндексировал сайты</text>

  <!-- Нижний акцент: оценка -->
  <rect x="180" y="215" width="400" height="50" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="380" y="237" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5c00">Поиск дал результат — но не истину!</text>
  <text x="380" y="255" text-anchor="middle" font-size="11" fill="#7a5c00">любой результат нужно оценить на достоверность</text>

  <path d="M640 150 Q640 200 480 222" stroke="#FFC107" stroke-width="2.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arry)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
    <marker id="arry" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FFC107"/></marker>
  </defs>
</svg>
