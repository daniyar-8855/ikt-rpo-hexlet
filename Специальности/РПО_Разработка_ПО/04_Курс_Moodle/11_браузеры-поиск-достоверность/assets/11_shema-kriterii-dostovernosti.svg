<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="340" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Критерии оценки достоверности источника</text>

  <!-- Центр -->
  <rect x="290" y="150" width="180" height="50" rx="8" fill="#2196F3"/>
  <text x="380" y="172" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Источник</text>
  <text x="380" y="190" text-anchor="middle" font-size="11" fill="#ffffff">можно ли доверять?</text>

  <!-- Автор -->
  <rect x="40" y="55" width="180" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="130" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Автор</text>
  <text x="130" y="94" text-anchor="middle" font-size="10" fill="#37474f">кто? эксперт?</text>

  <!-- Дата -->
  <rect x="540" y="55" width="180" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="630" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Дата</text>
  <text x="630" y="94" text-anchor="middle" font-size="10" fill="#37474f">свежая? не устарело?</text>

  <!-- Источник/издатель -->
  <rect x="40" y="160" width="180" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="130" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Издатель</text>
  <text x="130" y="199" text-anchor="middle" font-size="10" fill="#37474f">офиц. сайт? домен?</text>

  <!-- Цель -->
  <rect x="540" y="160" width="180" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="630" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Цель</text>
  <text x="630" y="199" text-anchor="middle" font-size="10" fill="#37474f">информировать? продать?</text>

  <!-- Проверяемость -->
  <rect x="290" y="265" width="180" height="46" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Проверяемость</text>
  <text x="380" y="304" text-anchor="middle" font-size="10" fill="#2e7d32">ссылки, совпадение с другими</text>

  <!-- Линии -->
  <g stroke="#90caf9" stroke-width="2" fill="none">
    <path d="M220 80 L290 158"/>
    <path d="M540 80 L470 158"/>
    <path d="M220 183 L290 178"/>
    <path d="M540 183 L470 178"/>
    <path d="M380 200 L380 265" stroke="#4CAF50"/>
  </g>
</svg>
