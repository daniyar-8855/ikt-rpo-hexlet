<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="290" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Графика (GUI) и командная строка (CLI)</text>

  <!-- GUI -->
  <rect x="30" y="55" width="330" height="205" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">GUI — графика</text>

  <rect x="60" y="100" width="270" height="36" rx="6" fill="#2196F3"/>
  <text x="195" y="123" text-anchor="middle" font-size="12" fill="#ffffff">Мышь, клики, окна</text>

  <text x="195" y="165" text-anchor="middle" font-size="12" fill="#0d2b45">наглядно и просто</text>
  <text x="195" y="190" text-anchor="middle" font-size="12" fill="#0d2b45">много кликов на задачу</text>
  <text x="195" y="215" text-anchor="middle" font-size="12" fill="#0d2b45">трудно автоматизировать</text>
  <text x="195" y="242" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">«создать папку мышкой»</text>

  <!-- CLI -->
  <rect x="400" y="55" width="330" height="205" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">CLI — терминал</text>

  <rect x="430" y="100" width="270" height="36" rx="6" fill="#4CAF50"/>
  <text x="565" y="123" text-anchor="middle" font-size="12" fill="#ffffff">Текстовые команды</text>

  <text x="565" y="165" text-anchor="middle" font-size="12" fill="#1b5e20">быстро: одна команда</text>
  <text x="565" y="190" text-anchor="middle" font-size="12" fill="#1b5e20">легко собрать в скрипт</text>
  <text x="565" y="215" text-anchor="middle" font-size="12" fill="#1b5e20">работает на сервере без графики</text>
  <text x="565" y="242" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">git, npm, pip, docker</text>
</svg>
