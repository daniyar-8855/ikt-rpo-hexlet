<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Структура команды: команда — флаги — аргументы</text>

  <!-- Пример строки -->
  <rect x="130" y="60" width="500" height="50" rx="8" fill="#0d2b45"/>
  <text x="200" y="92" text-anchor="middle" font-size="20" font-family="monospace" fill="#90caf9">ls</text>
  <text x="350" y="92" text-anchor="middle" font-size="20" font-family="monospace" fill="#ffd54f">-l</text>
  <text x="520" y="92" text-anchor="middle" font-size="20" font-family="monospace" fill="#a5d6a7">/home/user</text>

  <!-- Команда -->
  <rect x="120" y="160" width="170" height="44" rx="8" fill="#2196F3"/>
  <text x="205" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Команда</text>
  <text x="205" y="197" text-anchor="middle" font-size="11" fill="#ffffff">что сделать</text>

  <!-- Флаги -->
  <rect x="300" y="160" width="170" height="44" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="385" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Флаги / опции</text>
  <text x="385" y="197" text-anchor="middle" font-size="11" fill="#0d2b45">меняют поведение</text>

  <!-- Аргументы -->
  <rect x="480" y="160" width="170" height="44" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="180" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Аргументы</text>
  <text x="565" y="197" text-anchor="middle" font-size="11" fill="#1b5e20">над чем работать</text>

  <!-- Стрелки от примера к блокам -->
  <g stroke="#90caf9" stroke-width="2" fill="none" marker-end="url(#arr)">
    <path d="M200 112 L205 158"/>
    <path d="M350 112 L385 158"/>
    <path d="M520 112 L565 158"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="255" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">ls -l /home/user — «покажи содержимое /home/user подробным списком»</text>
  <text x="380" y="278" text-anchor="middle" font-size="11" fill="#37474f">Флаги пишут с дефисом: -l (подробно), -a (со скрытыми); справку даёт --help или Get-Help</text>
</svg>
