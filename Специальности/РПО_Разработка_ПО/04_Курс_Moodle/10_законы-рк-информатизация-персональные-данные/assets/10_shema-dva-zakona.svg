<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Что регулируют два закона РК</text>

  <!-- Закон об информатизации -->
  <rect x="30" y="55" width="330" height="215" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="195" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">«Об информатизации»</text>
  <text x="195" y="100" text-anchor="middle" font-size="11" fill="#37474f">2015, № 418-V</text>

  <rect x="60" y="115" width="270" height="34" rx="6" fill="#2196F3"/>
  <text x="195" y="137" text-anchor="middle" font-size="12" fill="#ffffff">Цифровая среда государства</text>

  <text x="195" y="172" text-anchor="middle" font-size="12" fill="#0d2b45">гос. информсистемы</text>
  <text x="195" y="196" text-anchor="middle" font-size="12" fill="#0d2b45">электронные услуги (eGov)</text>
  <text x="195" y="220" text-anchor="middle" font-size="12" fill="#0d2b45">защита информации</text>
  <text x="195" y="252" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">как устроена цифровая среда РК</text>

  <!-- Закон о персональных данных -->
  <rect x="400" y="55" width="330" height="215" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="565" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">«О персональных данных»</text>
  <text x="565" y="100" text-anchor="middle" font-size="11" fill="#2e7d32">2013, № 94-V</text>

  <rect x="430" y="115" width="270" height="34" rx="6" fill="#4CAF50"/>
  <text x="565" y="137" text-anchor="middle" font-size="12" fill="#ffffff">Данные о человеке</text>

  <text x="565" y="172" text-anchor="middle" font-size="12" fill="#1b5e20">сбор и согласие</text>
  <text x="565" y="196" text-anchor="middle" font-size="12" fill="#1b5e20">хранение и обработка</text>
  <text x="565" y="220" text-anchor="middle" font-size="12" fill="#1b5e20">защита и передача</text>
  <text x="565" y="252" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">правила работы с данными людей</text>
</svg>
