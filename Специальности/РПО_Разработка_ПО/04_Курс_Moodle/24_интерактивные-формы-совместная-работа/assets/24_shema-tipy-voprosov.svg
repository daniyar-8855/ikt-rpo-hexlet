<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Типы вопросов формы</text>

  <!-- Текст -->
  <rect x="40" y="60" width="210" height="200" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="40" y="60" width="210" height="40" rx="8" fill="#2196F3"/>
  <text x="145" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Текст</text>
  <text x="145" y="130" text-anchor="middle" font-size="12" fill="#0d2b45">свободный ответ</text>
  <text x="145" y="155" text-anchor="middle" font-size="12" fill="#0d2b45">короткий / абзац</text>
  <text x="145" y="200" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">ФИО, комментарий,</text>
  <text x="145" y="218" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">e-mail</text>

  <!-- Выбор -->
  <rect x="275" y="60" width="210" height="200" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="275" y="60" width="210" height="40" rx="8" fill="#2196F3"/>
  <text x="380" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Выбор</text>
  <text x="380" y="130" text-anchor="middle" font-size="12" fill="#0d2b45">один из / несколько</text>
  <text x="380" y="155" text-anchor="middle" font-size="12" fill="#0d2b45">список, флажки</text>
  <text x="380" y="200" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">город, группа,</text>
  <text x="380" y="218" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">да / нет</text>

  <!-- Шкала -->
  <rect x="510" y="60" width="210" height="200" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="510" y="60" width="210" height="40" rx="8" fill="#4CAF50"/>
  <text x="615" y="86" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Шкала</text>
  <text x="615" y="130" text-anchor="middle" font-size="12" fill="#1b5e20">линейный масштаб</text>
  <text x="615" y="155" text-anchor="middle" font-size="12" fill="#1b5e20">от 1 до 5</text>
  <text x="615" y="200" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">оценка, рейтинг,</text>
  <text x="615" y="218" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">удовлетворённость</text>

  <text x="380" y="285" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">правильный тип поля = чистые, готовые к анализу данные</text>
</svg>
