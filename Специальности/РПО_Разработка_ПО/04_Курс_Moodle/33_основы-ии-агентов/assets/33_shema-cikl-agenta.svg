<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="320" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Цикл работы ИИ-агента</text>

  <!-- Цель -->
  <rect x="290" y="50" width="180" height="42" rx="8" fill="#2196F3"/>
  <text x="380" y="76" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Цель</text>

  <!-- План -->
  <rect x="540" y="120" width="180" height="42" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="630" y="146" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">2. План (шаги)</text>

  <!-- Действие -->
  <rect x="540" y="210" width="180" height="42" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="630" y="236" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">3. Действие</text>

  <!-- Наблюдение -->
  <rect x="40" y="210" width="180" height="42" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="130" y="231" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">4. Наблюдение</text>
  <text x="130" y="246" text-anchor="middle" font-size="10" fill="#37474f">результат шага</text>

  <!-- Повтор / завершение -->
  <rect x="40" y="120" width="180" height="42" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="130" y="141" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">5. Повтор или</text>
  <text x="130" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">завершение</text>

  <!-- Стрелки по кругу -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M470 71 L540 130"/>
    <path d="M630 162 L630 210"/>
    <path d="M540 231 L220 231"/>
    <path d="M130 210 L130 162"/>
  </g>
  <!-- Стрелка повтора к цели -->
  <path d="M150 120 Q260 70 290 71" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrg)"/>
  <text x="250" y="100" text-anchor="middle" font-size="10" fill="#2e7d32" font-style="italic">цель не достигнута → следующий шаг</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4CAF50"/></marker>
  </defs>

  <text x="380" y="300" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">«подумал → сделал → проверил» — и так до результата (человек контролирует важные шаги)</text>
</svg>
