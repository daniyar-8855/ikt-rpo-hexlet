<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Что можно сделать через cabinet.salyk.kz</text>

  <!-- Центр -->
  <rect x="290" y="120" width="180" height="56" rx="8" fill="#2196F3"/>
  <text x="380" y="143" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">cabinet.salyk.kz</text>
  <text x="380" y="161" text-anchor="middle" font-size="11" fill="#ffffff">кабинет налогоплательщика</text>

  <!-- Услуга 1 -->
  <rect x="30" y="60" width="200" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="130" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Начисления и задолженность</text>
  <text x="130" y="97" text-anchor="middle" font-size="11" fill="#37474f">сколько и за что платить</text>

  <!-- Услуга 2 -->
  <rect x="530" y="60" width="200" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="630" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Налоговая отчётность</text>
  <text x="630" y="97" text-anchor="middle" font-size="11" fill="#37474f">сдача деклараций</text>

  <!-- Услуга 3 -->
  <rect x="30" y="190" width="200" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="130" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Оплата налогов</text>
  <text x="130" y="227" text-anchor="middle" font-size="11" fill="#37474f">онлайн, без визита</text>

  <!-- Услуга 4 -->
  <rect x="530" y="190" width="200" height="48" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="630" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="#0d2b45">Уведомления</text>
  <text x="630" y="227" text-anchor="middle" font-size="11" fill="#37474f">сроки и сообщения</text>

  <!-- Линии -->
  <g stroke="#90caf9" stroke-width="2" fill="none">
    <path d="M290 134 L230 90"/>
    <path d="M470 134 L530 90"/>
    <path d="M290 162 L230 206"/>
    <path d="M470 162 L530 206"/>
  </g>

  <text x="380" y="282" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Один кабинет — все налоговые операции легально и онлайн</text>
</svg>
