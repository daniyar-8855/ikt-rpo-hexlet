<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="250" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Регистрация ИП онлайн: шаги</text>

  <!-- Шаг 1 -->
  <rect x="20" y="80" width="160" height="60" rx="8" fill="#2196F3"/>
  <text x="100" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">1. Вход на портал</text>
  <text x="100" y="124" text-anchor="middle" font-size="11" fill="#ffffff">egov.kz / salyk.kz</text>

  <!-- Шаг 2 -->
  <rect x="210" y="80" width="160" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="290" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">2. Заявление</text>
  <text x="290" y="124" text-anchor="middle" font-size="11" fill="#37474f">вид деятельности, режим</text>

  <!-- Шаг 3 -->
  <rect x="400" y="80" width="160" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="480" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">3. Подпись ЭЦП</text>
  <text x="480" y="124" text-anchor="middle" font-size="11" fill="#37474f">подтверждение личности</text>

  <!-- Шаг 4 -->
  <rect x="590" y="80" width="150" height="60" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="665" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">4. Готово</text>
  <text x="665" y="124" text-anchor="middle" font-size="11" fill="#1b5e20">ИП зарегистрирован</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M180 110 L208 110"/>
    <path d="M370 110 L398 110"/>
    <path d="M560 110 L588 110"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="200" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Только через официальные порталы — занимает минуты, без визита в офис</text>
  <text x="380" y="222" text-anchor="middle" font-size="11" fill="#b71c1c" font-style="italic">Никогда не передавай ключ и пароль ЭЦП посредникам</text>
</svg>
