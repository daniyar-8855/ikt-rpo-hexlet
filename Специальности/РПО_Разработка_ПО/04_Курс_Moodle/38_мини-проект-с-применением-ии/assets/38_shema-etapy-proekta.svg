<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="250" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Этапы мини-проекта с применением ИИ</text>

  <!-- 1. Идея -->
  <rect x="20" y="70" width="130" height="56" rx="8" fill="#2196F3"/>
  <text x="85" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Идея</text>
  <text x="85" y="112" text-anchor="middle" font-size="10" fill="#ffffff">выбор задачи</text>

  <!-- 2. Данные -->
  <rect x="170" y="70" width="130" height="56" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="235" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. Данные</text>
  <text x="235" y="112" text-anchor="middle" font-size="10" fill="#37474f">тестовые/обезличенные</text>

  <!-- 3. Инструмент ИИ -->
  <rect x="320" y="70" width="130" height="56" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="385" y="94" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">3. Инструмент</text>
  <text x="385" y="112" text-anchor="middle" font-size="10" fill="#37474f">ИИ + код/таблицы</text>

  <!-- 4. Результат -->
  <rect x="470" y="70" width="130" height="56" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="535" y="94" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">4. Результат</text>
  <text x="535" y="112" text-anchor="middle" font-size="10" fill="#37474f">оформление</text>

  <!-- 5. Вывод и проверка -->
  <rect x="620" y="70" width="130" height="56" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="685" y="92" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">5. Вывод</text>
  <text x="685" y="110" text-anchor="middle" font-size="10" fill="#1b5e20">проверка ИИ</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M150 98 L168 98"/>
    <path d="M300 98 L318 98"/>
    <path d="M450 98 L468 98"/>
    <path d="M600 98 L618 98"/>
  </g>

  <!-- Стрелка возврата на проверку -->
  <path d="M685 126 Q685 180 385 180 Q85 180 85 128" stroke="#4CAF50" stroke-width="2.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrg)"/>
  <text x="385" y="200" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">нашёл ошибку при проверке → вернись и исправь</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
    <marker id="arrg" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4CAF50"/></marker>
  </defs>

  <text x="380" y="235" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">за результат отвечает человек: ИИ помогает, но проверяешь и подписываешь — ты</text>
</svg>
