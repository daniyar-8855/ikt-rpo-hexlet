<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="270" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Три вида тестов для одной функции</text>

  <!-- Обычный ввод -->
  <rect x="30" y="60" width="220" height="160" rx="10" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="140" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Обычный ввод</text>
  <rect x="55" y="105" width="170" height="34" rx="6" fill="#4CAF50"/>
  <text x="140" y="127" text-anchor="middle" font-size="12" fill="#ffffff">[1, 2, 3]</text>
  <text x="140" y="165" text-anchor="middle" font-size="12" fill="#1b5e20">типичный случай</text>
  <text x="140" y="190" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">«должно работать»</text>

  <!-- Крайний случай -->
  <rect x="270" y="60" width="220" height="160" rx="10" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">Крайний случай</text>
  <rect x="295" y="105" width="170" height="34" rx="6" fill="#2196F3"/>
  <text x="380" y="127" text-anchor="middle" font-size="12" fill="#ffffff">[]   0   -1</text>
  <text x="380" y="165" text-anchor="middle" font-size="12" fill="#0d2b45">пусто, ноль,</text>
  <text x="380" y="185" text-anchor="middle" font-size="12" fill="#0d2b45">отрицательное</text>
  <text x="380" y="208" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">«здесь часто падает»</text>

  <!-- Некорректный ввод -->
  <rect x="510" y="60" width="220" height="160" rx="10" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="620" y="88" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a5c00">Некорректный ввод</text>
  <rect x="535" y="105" width="170" height="34" rx="6" fill="#FFC107"/>
  <text x="620" y="127" text-anchor="middle" font-size="12" fill="#5a4500">"текст"   None</text>
  <text x="620" y="165" text-anchor="middle" font-size="12" fill="#7a5c00">не тот тип данных</text>
  <text x="620" y="190" text-anchor="middle" font-size="11" fill="#9a7400" font-style="italic">«должно дать ошибку»</text>

  <text x="380" y="252" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">ИИ помогает придумать «ломающие» данные для крайних и некорректных случаев</text>
</svg>
