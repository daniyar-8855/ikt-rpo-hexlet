<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Три свойства защиты информации</text>

  <!-- Конфиденциальность -->
  <rect x="30" y="60" width="220" height="160" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="55" y="78" width="170" height="34" rx="6" fill="#2196F3"/>
  <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Конфиденциальность</text>
  <text x="140" y="140" text-anchor="middle" font-size="12" fill="#0d2b45">данные видит только</text>
  <text x="140" y="158" text-anchor="middle" font-size="12" fill="#0d2b45">тот, кому разрешено</text>
  <text x="140" y="192" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">пароли, 2FA, шифрование</text>

  <!-- Целостность -->
  <rect x="270" y="60" width="220" height="160" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <rect x="295" y="78" width="170" height="34" rx="6" fill="#2196F3"/>
  <text x="380" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Целостность</text>
  <text x="380" y="140" text-anchor="middle" font-size="12" fill="#0d2b45">данные не искажены</text>
  <text x="380" y="158" text-anchor="middle" font-size="12" fill="#0d2b45">и не подменены</text>
  <text x="380" y="192" text-anchor="middle" font-size="11" fill="#37474f" font-style="italic">контроль версий, проверки</text>

  <!-- Доступность -->
  <rect x="510" y="60" width="220" height="160" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="535" y="78" width="170" height="34" rx="6" fill="#4CAF50"/>
  <text x="620" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Доступность</text>
  <text x="620" y="140" text-anchor="middle" font-size="12" fill="#1b5e20">данные доступны,</text>
  <text x="620" y="158" text-anchor="middle" font-size="12" fill="#1b5e20">когда они нужны</text>
  <text x="620" y="192" text-anchor="middle" font-size="11" fill="#2e7d32" font-style="italic">резервные копии 3-2-1</text>

  <text x="380" y="262" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Защита — это баланс всех трёх свойств одновременно (триада CIA)</text>
</svg>
