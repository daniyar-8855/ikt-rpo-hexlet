<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Как работает ИИ-ассистент кода</text>

  <!-- Запрос разработчика -->
  <rect x="30" y="90" width="200" height="80" rx="8" fill="#2196F3"/>
  <text x="130" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Запрос</text>
  <text x="130" y="140" text-anchor="middle" font-size="12" fill="#ffffff">разработчика</text>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#e3f2fd">язык, задача, вход/выход</text>

  <!-- Предложение ИИ -->
  <rect x="280" y="90" width="200" height="80" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. Предложение ИИ</text>
  <text x="380" y="140" text-anchor="middle" font-size="12" fill="#0d2b45">черновик кода</text>
  <text x="380" y="158" text-anchor="middle" font-size="11" fill="#37474f">или объяснение</text>

  <!-- Проверка человеком -->
  <rect x="530" y="90" width="200" height="80" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="630" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">3. Проверка</text>
  <text x="630" y="140" text-anchor="middle" font-size="12" fill="#1b5e20">человеком</text>
  <text x="630" y="158" text-anchor="middle" font-size="11" fill="#2e7d32">понять, запустить, тест</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M230 130 L278 130"/>
    <path d="M480 130 L528 130"/>
  </g>

  <!-- Возврат при ошибке -->
  <path d="M630 170 Q630 230 380 230 Q130 230 130 172" stroke="#FFC107" stroke-width="2.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arry)"/>
  <text x="380" y="225" text-anchor="middle" font-size="11" fill="#b28704" font-style="italic">есть ошибка → уточни запрос и повтори</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
    <marker id="arry" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#FFC107"/></marker>
  </defs>

  <text x="380" y="275" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">ИИ даёт черновик — финальный код остаётся ответственностью разработчика</text>
</svg>
