<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 290" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="290" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Что умеет ИИ-ассистент кода</text>

  <!-- Центр -->
  <rect x="290" y="120" width="180" height="50" rx="8" fill="#2196F3"/>
  <text x="380" y="143" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">ИИ-ассистент</text>
  <text x="380" y="160" text-anchor="middle" font-size="11" fill="#e3f2fd">кода</text>

  <!-- Генерация -->
  <rect x="40" y="55" width="200" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="140" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Генерация</text>
  <text x="140" y="92" text-anchor="middle" font-size="11" fill="#37474f">черновик функции по описанию</text>

  <!-- Объяснение -->
  <rect x="520" y="55" width="200" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="620" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Объяснение</text>
  <text x="620" y="92" text-anchor="middle" font-size="11" fill="#37474f">разбор чужого кода построчно</text>

  <!-- Рефакторинг -->
  <rect x="40" y="190" width="200" height="46" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="140" y="211" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d2b45">Рефакторинг</text>
  <text x="140" y="227" text-anchor="middle" font-size="11" fill="#37474f">переписать, добавить комментарии</text>

  <!-- Поиск ошибок и тесты -->
  <rect x="520" y="190" width="200" height="46" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="620" y="211" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Ошибки и тесты</text>
  <text x="620" y="227" text-anchor="middle" font-size="11" fill="#2e7d32">найти баг, предложить правку</text>

  <!-- Линии -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none">
    <path d="M290 135 L240 80"/>
    <path d="M470 135 L520 80"/>
    <path d="M290 155 L240 200"/>
    <path d="M470 155 L520 200"/>
  </g>

  <text x="380" y="278" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">любой результат разработчик понимает и проверяет сам</text>
</svg>
