<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Структура запроса к ИИ для анализа данных</text>

  <!-- Данные -->
  <rect x="40" y="70" width="200" height="80" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="140" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">1. Данные</text>
  <text x="140" y="120" text-anchor="middle" font-size="11" fill="#37474f">таблица или показатели,</text>
  <text x="140" y="136" text-anchor="middle" font-size="11" fill="#37474f">БЕЗ персональных данных</text>

  <!-- Контекст -->
  <rect x="280" y="70" width="200" height="80" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. Контекст</text>
  <text x="380" y="120" text-anchor="middle" font-size="11" fill="#37474f">что это за данные</text>
  <text x="380" y="136" text-anchor="middle" font-size="11" fill="#37474f">и за какой период</text>

  <!-- Вопрос -->
  <rect x="520" y="70" width="200" height="80" rx="8" fill="#2196F3"/>
  <text x="620" y="98" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">3. Конкретный вопрос</text>
  <text x="620" y="120" text-anchor="middle" font-size="11" fill="#ffffff">«какой тренд?»,</text>
  <text x="620" y="136" text-anchor="middle" font-size="11" fill="#ffffff">«есть ли аномалии?»</text>

  <!-- Плюсы -->
  <text x="260" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#90caf9">+</text>
  <text x="500" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#90caf9">+</text>

  <!-- Стрелка вниз к результату -->
  <path d="M380 150 L380 195" stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Результат -->
  <rect x="190" y="200" width="380" height="62" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Полезная интерпретация (черновик выводов)</text>
  <text x="380" y="248" text-anchor="middle" font-size="11" fill="#1b5e20">который человек потом проверяет</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="288" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Расплывчатый запрос → расплывчатый ответ. Чем точнее вопрос — тем полезнее интерпретация.</text>
</svg>
