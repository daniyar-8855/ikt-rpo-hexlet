<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="280" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Вывод ИИ — это гипотеза, а не факт</text>

  <!-- Вывод ИИ -->
  <rect x="40" y="80" width="200" height="70" rx="8" fill="#2196F3"/>
  <text x="140" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Вывод ИИ</text>
  <text x="140" y="130" text-anchor="middle" font-size="11" fill="#ffffff">тренд, причина, гипотеза</text>

  <!-- стрелка -->
  <path d="M240 115 L300 115" stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="270" y="105" text-anchor="middle" font-size="11" fill="#37474f">считаем</text>

  <!-- Гипотеза -->
  <rect x="305" y="80" width="150" height="70" rx="8" fill="#fff8e1" stroke="#FFC107" stroke-width="1.5"/>
  <text x="380" y="112" text-anchor="middle" font-size="14" font-weight="bold" fill="#7a5c00">Гипотеза</text>
  <text x="380" y="132" text-anchor="middle" font-size="11" fill="#7a5c00">требует проверки</text>

  <!-- стрелка -->
  <path d="M455 115 L515 115" stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="485" y="105" text-anchor="middle" font-size="11" fill="#37474f">человек</text>

  <!-- Проверка -->
  <rect x="520" y="80" width="200" height="70" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="620" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">Проверка по данным</text>
  <text x="620" y="130" text-anchor="middle" font-size="11" fill="#1b5e20">и фактам → решение</text>

  <!-- Нижняя плашка -->
  <rect x="40" y="190" width="680" height="50" rx="8" fill="#fdecea" stroke="#f44336" stroke-width="1.5"/>
  <text x="380" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#a31515">Нельзя: принимать вывод ИИ как доказанный факт без проверки</text>
  <text x="380" y="230" text-anchor="middle" font-size="11" fill="#a31515">ИИ может ошибаться и выдумывать причину (галлюцинация). Ответственность — на человеке.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>
</svg>
