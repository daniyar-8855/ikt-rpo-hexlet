<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="360" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Слои компьютерной системы</text>

  <!-- Прикладное ПО -->
  <rect x="180" y="55" width="400" height="60" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="380" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#1b5e20">Прикладное ПО</text>
  <text x="380" y="103" text-anchor="middle" font-size="12" fill="#1b5e20">браузер, редактор кода, твоя программа</text>

  <!-- Операционная система -->
  <rect x="180" y="150" width="400" height="60" rx="8" fill="#2196F3"/>
  <text x="380" y="177" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Операционная система (ОС)</text>
  <text x="380" y="198" text-anchor="middle" font-size="12" fill="#ffffff">управляет процессами, памятью, файлами, доступом</text>

  <!-- Аппаратное обеспечение -->
  <rect x="180" y="245" width="400" height="60" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="272" text-anchor="middle" font-size="15" font-weight="bold" fill="#0d2b45">Аппаратное обеспечение («железо»)</text>
  <text x="380" y="293" text-anchor="middle" font-size="12" fill="#0d2b45">CPU, RAM, SSD/HDD, GPU</text>

  <!-- Стрелки между слоями (двусторонние запросы) -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none">
    <path d="M380 115 L380 150" marker-end="url(#arr)"/>
    <path d="M380 210 L380 245" marker-end="url(#arr)"/>
  </g>

  <!-- Подписи направлений -->
  <text x="600" y="138" text-anchor="start" font-size="11" fill="#37474f" font-style="italic">приложение просит ОС</text>
  <text x="600" y="233" text-anchor="start" font-size="11" fill="#37474f" font-style="italic">ОС управляет «железом»</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="340" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">ОС — посредник: верхний слой обращается к ОС, а ОС управляет нижним</text>
</svg>
