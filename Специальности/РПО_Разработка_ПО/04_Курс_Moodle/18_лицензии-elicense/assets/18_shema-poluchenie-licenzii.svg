<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" fill="#ffffff"/>

  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a3c5e">Получение лицензии онлайн на eLicense.kz</text>

  <!-- 1. Подача заявки -->
  <rect x="30" y="70" width="210" height="90" rx="8" fill="#2196F3"/>
  <text x="135" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Подача заявки</text>
  <text x="135" y="124" text-anchor="middle" font-size="12" fill="#ffffff">вход по ЭЦП,</text>
  <text x="135" y="142" text-anchor="middle" font-size="12" fill="#ffffff">выбор вида, документы</text>

  <!-- 2. Проверка -->
  <rect x="275" y="70" width="210" height="90" rx="8" fill="#e8f4fd" stroke="#2196F3" stroke-width="1.5"/>
  <text x="380" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#0d2b45">2. Проверка</text>
  <text x="380" y="124" text-anchor="middle" font-size="12" fill="#0d2b45">госорган проверяет,</text>
  <text x="380" y="142" text-anchor="middle" font-size="12" fill="#0d2b45">статус виден в кабинете</text>

  <!-- 3. Выдача -->
  <rect x="520" y="70" width="210" height="90" rx="8" fill="#e8f5e9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="625" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#1b5e20">3. Выдача</text>
  <text x="625" y="124" text-anchor="middle" font-size="12" fill="#1b5e20">лицензия в личном</text>
  <text x="625" y="142" text-anchor="middle" font-size="12" fill="#1b5e20">кабинете онлайн</text>

  <!-- Стрелки -->
  <g stroke="#90caf9" stroke-width="2.5" fill="none" marker-end="url(#arr)">
    <path d="M240 115 L275 115"/>
    <path d="M485 115 L520 115"/>
  </g>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2196F3"/></marker>
  </defs>

  <text x="380" y="210" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3c5e">Заявление подписывается ЭЦП на каждом шаге</text>
  <text x="380" y="250" text-anchor="middle" font-size="12" fill="#37474f" font-style="italic">Только официальный elicense.kz — без посредников и предоплаты по чужим ссылкам</text>
</svg>
